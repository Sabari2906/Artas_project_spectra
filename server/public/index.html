<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectra Agent — ARTAS Clinic Assistant</title>
    <meta name="description"
        content="Chat with Spectra Agent, your AI-powered assistant for ARTAS hair transplant clinic.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* [STYLES - copied from original index.html, trimmed for clarity] */
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a28;
            --bg-chat: #0e0e16;
            --surface: #1e1e2e;
            --surface-hover: #252538;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.25);
            --accent-soft: rgba(108, 92, 231, 0.12);
            --green: #00d2a0;
            --green-glow: rgba(0, 210, 160, 0.2);
            --green-soft: rgba(0, 210, 160, 0.08);
            --text: #eaeaf5;
            --text-secondary: #9898b0;
            --text-muted: #5a5a78;
            --border: rgba(255, 255, 255, 0.06);
            --border-active: rgba(108, 92, 231, 0.4);
            --user-bubble: linear-gradient(135deg, #6c5ce7, #7c6cf7);
            --bot-bubble: #1a1a2e;
            --radius: 20px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text);
            height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app {
            width: 100%;
            max-width: 460px;
            height: 100dvh;
            max-height: 860px;
            background: var(--bg-secondary);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 120px var(--accent-glow);
            position: relative;
        }

        @media (max-width: 480px) {
            .app {
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
            }
        }

        .header {
            padding: 18px 22px;
            background: linear-gradient(180deg, rgba(108, 92, 231, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .bot-avatar {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            background: linear-gradient(135deg, #6c5ce7, #00d2a0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 20px var(--accent-glow);
            position: relative;
            flex-shrink: 0;
        }

        .bot-avatar::after {
            content: '';
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 13px;
            height: 13px;
            background: #00d2a0;
            border-radius: 50%;
            border: 2.5px solid var(--bg-secondary);
            box-shadow: 0 0 8px rgba(0, 210, 160, 0.6);
        }

        .header-text h1 {
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .reset-btn {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.25s;
        }

        .reset-btn:hover {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px 18px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
            background: var(--bg-chat);
        }

        .chat::-webkit-scrollbar {
            width: 4px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        .msg-row.bot {
            align-self: flex-start;
        }

        .msg-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-row.bot .msg-avatar {
            background: linear-gradient(135deg, #6c5ce7, #00d2a0);
        }

        .msg-row.user .msg-avatar {
            background: var(--surface);
            font-size: 13px;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 0 4px;
        }

        .msg-row.bot .msg-sender {
            color: var(--accent);
        }

        .msg-row.user .msg-sender {
            color: var(--text-secondary);
            text-align: right;
        }

        .msg-bubble {
            padding: 13px 17px;
            font-size: 14px;
            line-height: 1.6;
            border-radius: var(--radius);
            word-break: break-word;
        }

        .msg-row.bot .msg-bubble {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-top-left-radius: 6px;
            color: var(--text);
        }

        .msg-row.user .msg-bubble {
            background: var(--user-bubble);
            border-top-right-radius: 6px;
            color: #fff;
            font-weight: 500;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .msg-time {
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 6px;
        }

        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .quick-reply-btn {
            background: var(--accent-soft);
            color: #a89cef;
            border: 1px solid rgba(108, 92, 231, 0.25);
            border-radius: 24px;
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.25s;
        }

        .quick-reply-btn:hover {
            background: var(--accent);
            color: #fff;
        }

        .typing-row {
            display: none;
            align-self: flex-start;
            gap: 10px;
            max-width: 88%;
        }

        .typing-row.active {
            display: flex;
        }

        .typing-dots {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 20px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dots span {
            width: 7px;
            height: 7px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }

        @keyframes dotBounce {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            30% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        .input-bar {
            padding: 16px 18px 20px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-bar input {
            flex: 1;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 20px;
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: all 0.25s;
        }

        .input-bar input:focus {
            border-color: var(--border-active);
            background: rgba(108, 92, 231, 0.04);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #6c5ce7, #7c6cf7);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 16px var(--accent-glow);
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: translateY(-2px) scale(1.04);
        }

        .cal {
            background: var(--bot-bubble);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            font-family: 'Inter', sans-serif;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .cal-title {
            font-size: 15px;
            font-weight: 700;
        }

        .cal-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 6px;
        }

        .cal-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 2px solid transparent;
            background: transparent;
        }

        .cal-day.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            text-decoration: line-through;
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="header">
            <div class="header-left">
                <div class="bot-avatar">✦</div>
                <div class="header-text">
                    <h1>Spectra Agent</h1>
                    <p>ARTAS Clinic Assistant</p>
                </div>
            </div>
            <button class="reset-btn" onclick="resetChat()" title="Start over">Reset</button>
        </div>

        <div class="chat" id="chatbox">
            <div class="msg-row bot" style="animation-delay:0s">
                <div class="msg-avatar">✦</div>
                <div class="msg-content">
                    <span class="msg-sender">Spectra Agent</span>
                    <div class="msg-bubble">
                        👋 Hello! I'm <b>Spectra agent</b>, your clinic assistant.<br><br>
                        Before we begin, may I know your <b>Full Name</b>?
                    </div>
                </div>
            </div>

            <div class="typing-row" id="typing">
                <div class="msg-avatar" style="background:linear-gradient(135deg,#6c5ce7,#00d2a0)">✦</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <div class="input-bar">
            <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="handleKey(event)"
                autocomplete="off">
            <button class="send-btn" onclick="processUserInput()" aria-label="Send message">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script>
        // Validation constants
        const PHONE_REGEX = /^[\d\s\-\+\(\)]+$/;
        const VALID_PHONE_LENGTH_MIN = 10;
        const VALID_PHONE_LENGTH_MAX = 15;

        let chatState = 0; // 0=name, 1=phone, 2=active, 3=date
        let patientName = '';
        let patientPhone = '';

        // Load session from localStorage
        function loadSession() {
            try {
                const saved = localStorage.getItem('spectra_session');
                if (saved) {
                    const data = JSON.parse(saved);
                    if (data.timestamp && Date.now() - data.timestamp < 24 * 60 * 60 * 1000) {
                        chatState = data.chatState || 0;
                        patientName = data.patientName || '';
                        patientPhone = data.patientPhone || '';
                        return true;
                    }
                }
            } catch (e) {
                console.warn('Session load error:', e);
            }
            return false;
        }

        // Save session to localStorage
        function saveSession() {
            try {
                localStorage.setItem('spectra_session', JSON.stringify({
                    chatState,
                    patientName,
                    patientPhone,
                    timestamp: Date.now()
                }));
            } catch (e) {
                console.warn('Session save error:', e);
            }
        }

        // Validate phone number
        function isValidPhone(phone) {
            const cleaned = phone.replace(/\D/g, '');
            return PHONE_REGEX.test(phone) &&
                cleaned.length >= VALID_PHONE_LENGTH_MIN &&
                cleaned.length <= VALID_PHONE_LENGTH_MAX;
        }

        // Sanitize text for safe display
        function sanitizeText(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Reset chat
        function resetChat() {
            if (confirm('Start a new conversation?')) {
                chatState = 0;
                patientName = '';
                patientPhone = '';
                localStorage.removeItem('spectra_session');
                document.getElementById('chatbox').innerHTML = `
                <div class="msg-row bot">
                    <div class="msg-avatar">✦</div>
                    <div class="msg-content">
                        <span class="msg-sender">Spectra Agent</span>
                        <div class="msg-bubble">
                            👋 Hello! I'm <b>Spectra</b>, your clinic assistant.<br><br>
                            Before we begin, may I know your <b>Full Name</b>?
                        </div>
                    </div>
                </div>
                <div class="typing-row" id="typing">
                    <div class="msg-avatar" style="background:linear-gradient(135deg,#6c5ce7,#00d2a0)">✦</div>
                    <div class="typing-dots">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
                document.getElementById('msgInput').focus();
            }
        }

        function handleKey(e) { if (e.key === 'Enter') processUserInput(); }

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function appendMessage(html, sender, animate) {
            const chatbox = document.getElementById('chatbox');
            const typing = document.getElementById('typing');

            const row = document.createElement('div');
            row.className = `msg-row ${sender}`;

            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = sender === 'bot' ? '✦' : '👤';

            const content = document.createElement('div');
            content.className = 'msg-content';

            const label = document.createElement('span');
            label.className = 'msg-sender';
            label.textContent = sender === 'bot' ? 'Spectra Agent' : patientName || 'You';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';

            const time = document.createElement('span');
            time.className = 'msg-time';
            time.textContent = getTime();

            bubble.innerHTML = html.replace(/\n/g, '<br>');
            content.appendChild(label);
            content.appendChild(bubble);
            content.appendChild(time);
            row.appendChild(avatar);
            row.appendChild(content);
            chatbox.insertBefore(row, typing);
            chatbox.scrollTop = chatbox.scrollHeight;
            saveSession();
        }

        function showTyping() {
            document.getElementById('typing').classList.add('active');
            document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;
        }

        function hideTyping() {
            document.getElementById('typing').classList.remove('active');
        }

        async function processUserInput(explicitText) {
            const input = document.getElementById('msgInput');
            const text = explicitText || input.value.trim();
            if (!text) return;

            // Sanitize user input for display
            const sanitized = sanitizeText(text);
            appendMessage(sanitized, 'user', false);
            input.value = '';
            showTyping();

            setTimeout(async () => {
                hideTyping();

                if (chatState === 0) {
                    if (text.length < 2) {
                        appendMessage('⚠️ Please enter a valid name (at least 2 characters).', 'bot', false);
                        return;
                    }
                    patientName = text;
                    chatState = 1;
                    saveSession();
                    appendMessage(`Nice to meet you, <b>${sanitizeText(text)}</b>! 🎉<br><br>Could you share your <b>Phone Number</b>? (format: +1-234-567-8900)`, 'bot', true);
                }
                else if (chatState === 1) {
                    if (!isValidPhone(text)) {
                        appendMessage('⚠️ Invalid phone number. Please use format: +1-234-567-8900 (10-15 digits with spaces, hyphens, or parentheses).', 'bot', false);
                        return;
                    }
                    patientPhone = text;
                    chatState = 2;
                    saveSession();
                    appendMessage(
                        `Perfect, you're all set! ✅<br><br>How can I help you today?` +
                        `<div class='quick-replies'>` +
                        `<button class='quick-reply-btn' onclick='processUserInput("book")'>📅 Book Appointment</button>` +
                        `<button class='quick-reply-btn' onclick='processUserInput("status")'>🔍 Check Status</button>` +
                        `<button class='quick-reply-btn' onclick='processUserInput("cancel")'>✕ Cancel Appointment</button>` +
                        `<button class='quick-reply-btn' onclick='processUserInput("treatments")'>💊 Treatments</button>` +
                        `<button class='quick-reply-btn' onclick='processUserInput("faq")'>❓ FAQ</button>` +
                        `</div>`, 'bot', true
                    );
                }
                else if (chatState === 2) {
                    if (text.toLowerCase() === 'book') {
                        chatState = 3;
                        saveSession();
                        appendMessage("Great choice! 📅 Pick your preferred date below.", 'bot', true);

                        try {
                            const occRes = await fetch('/api/appointments/occupied-dates');
                            if (!occRes.ok) throw new Error("Server error");
                            const occupiedDates = await occRes.json();

                            const chatbox = document.getElementById('chatbox');
                            const typingEl = document.getElementById('typing');
                            const calRow = document.createElement('div');
                            calRow.className = 'msg-row bot';
                            calRow.innerHTML = `
                            <div class="msg-avatar">✦</div>
                            <div class="msg-content">
                                <span class="msg-sender">Spectra Agent</span>
                                <div class="msg-bubble" style="padding:14px 10px 10px;">
                                    <div id="custom-cal"></div>
                                </div>
                            </div>`;
                            chatbox.insertBefore(calRow, typingEl);

                            buildCalendar(document.getElementById('custom-cal'), occupiedDates, (dateStr) => {
                                if (chatState === 3) { calRow.remove(); processUserInput(dateStr); }
                            });
                            chatbox.scrollTop = chatbox.scrollHeight;
                        } catch (e) {
                            appendMessage(`⚠️ Calendar error. Please type date as YYYY-MM-DD.`, 'bot', true);
                            chatState = 2;
                            saveSession();
                        }
                        return;
                    }

                    try {
                        showTyping();
                        const res = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: patientPhone, name: patientName, message: text })
                        });
                        const data = await res.json();
                        hideTyping();
                        appendMessage(sanitizeText(data.reply || 'No response from server'), 'bot', true);
                    } catch (err) {
                        hideTyping();
                        appendMessage("⚠️ Connection error. Please try again.", 'bot', true);
                    }
                }
                else if (chatState === 3) {
                    try {
                        showTyping();
                        const res = await fetch('/api/chat', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ phone: patientPhone, name: patientName, action: 'book', date: text })
                        });
                        if (!res.ok) throw new Error('Server error');
                        const data = await res.json();
                        hideTyping();
                        appendMessage(sanitizeText(data.reply || 'Booking confirmed'), 'bot', true);
                        chatState = 2;
                        saveSession();
                    } catch (err) {
                        hideTyping();
                        appendMessage("⚠️ Booking error. " + (err.message || 'Please try again.'), 'bot', true);
                        chatState = 2;
                        saveSession();
                    }
                }
            }, 500 + Math.random() * 400);
        }

        function buildCalendar(container, occupiedDates, onSelect) {
            const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const DAYS = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            let viewYear = today.getFullYear(), viewMonth = today.getMonth();

            function fmt(d) {
                return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            }

            function render() {
                const firstDay = new Date(viewYear, viewMonth, 1).getDay();
                const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
                const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

                let h = '<div class="cal">';
                h += '<div class="cal-header"><span class="cal-title">' + MONTHS[viewMonth] + ' ' + viewYear + '</span>';
                h += '<div class="cal-nav"><button id="cpv" title="Previous">‹</button><button id="cnx" title="Next">›</button></div></div>';
                h += '<div class="cal-weekdays">';
                DAYS.forEach(d => { h += '<span>' + d + '</span>'; });
                h += '</div><div class="cal-days">';

                for (let i = firstDay - 1; i >= 0; i--)
                    h += '<div class="cal-day empty other-month">' + (daysInPrev - i) + '</div>';

                for (let d = 1; d <= daysInMonth; d++) {
                    const dt = new Date(viewYear, viewMonth, d);
                    const ds = fmt(dt);
                    const isToday = dt.getTime() === today.getTime();
                    const isPast = dt < today;
                    const isOcc = occupiedDates.includes(ds);
                    let c = 'cal-day';
                    if (isToday) c += ' today';
                    if (isPast) c += ' past';
                    if (isOcc) c += ' disabled';
                    const ok = !isPast && !isOcc;
                    if (ok) {
                        h += '<div class="' + c + '" data-date="' + ds + '">' + d + '</div>';
                    } else {
                        h += '<div class="' + c + '">' + d + '</div>';
                    }
                }

                const total = firstDay + daysInMonth;
                const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
                for (let i = 1; i <= rem; i++)
                    h += '<div class="cal-day empty other-month">' + i + '</div>';

                h += '</div>';
                h += '<div class="cal-legend"><span><div class="dot-today"></div> Today</span>';
                h += '<span><div class="dot-occupied"></div> Booked</span>';
                h += '<span><div class="dot-available"></div> Available</span></div></div>';

                container.innerHTML = h;

                const prev = container.querySelector('#cpv');
                const next = container.querySelector('#cnx');
                if (prev) prev.onclick = () => { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render(); };
                if (next) next.onclick = () => { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render(); };

                container.querySelectorAll('.cal-day[data-date]').forEach(el => {
                    el.onclick = () => { el.classList.add('selected'); setTimeout(() => onSelect(el.dataset.date), 200); };
                });

                document.getElementById('chatbox').scrollTop = document.getElementById('chatbox').scrollHeight;
            }
            render();
        }

        // Load session on startup
        if (!loadSession()) {
            chatState = 0;
            patientName = '';
            patientPhone = '';
        }

        document.getElementById('msgInput').focus();
    </script>
</body>

</html>
